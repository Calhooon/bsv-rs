[package]
name = "bsv-primitives"
version = "0.1.0"
edition = "2021"
description = "BSV blockchain cryptographic primitives in Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/bsv/rust-sdk"
keywords = ["bitcoin", "bsv", "cryptography", "blockchain"]
categories = ["cryptography", "encoding"]

[dependencies]
# Hashing
sha2 = "0.10"
sha1 = "0.10"
ripemd = "0.1"
hmac = "0.12"
pbkdf2 = { version = "0.12", features = ["hmac"] }

# Elliptic Curves (for later phases)
k256 = { version = "0.13", features = ["ecdsa", "sha256"] }
p256 = "0.13"

# Symmetric Encryption (for later phases)
aes-gcm = "0.10"

# Big Integers
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"

# Randomness
rand = "0.8"
getrandom = { version = "0.2", features = ["js"] }

# Constant-time operations
subtle = "2.5"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hex = "0.4"
bs58 = "0.5"
base64 = "0.22"

# Error handling
thiserror = "1.0"

[dev-dependencies]
criterion = "0.5"

[features]
default = []
wasm = ["getrandom/js"]

[[bench]]
name = "hash_bench"
harness = false

[[bench]]
name = "primitives_bench"
harness = false
